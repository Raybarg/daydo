<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sparkler Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 20px 0;
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            margin: 10px 0 5px;
        }
        p {
            margin: 5px 0 15px;
            opacity: 0.8;
        }
        .controls {
            margin: 0 auto 15px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #111;
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #333;
        }
        input[type="range"] {
            width: 220px;
            accent-color: #ffaa00;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border: 3px solid #222;
            box-shadow: 0 0 30px rgba(255, 180, 0, 0.3);
            background: #050515;
        }
    </style>
</head>
<body>
    <h1>✨ Sparkler Simulation ✨</h1>
    <p>Move your mouse to wave the sparkler • Sparks are individual objects managed by <code>SparkManager</code></p>
    
    <div class="controls">
        <label for="rate">Sparks per frame:</label>
        <input type="range" id="rate" min="0" max="30" value="7" step="1">
        <span id="rateValue" style="font-weight:bold; min-width:28px; display:inline-block;">7</span>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <script>
        // ====================== SPARK CLASS ======================
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;

                // Random direction + speed
                const angle = Math.random() * Math.PI * 2;
                const speed = 2.8 + Math.random() * 6.5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 1.8; // slight upward bias

                // Life (frames)
                this.life = 32 + Math.random() * 42;
                this.maxLife = this.life;

                // Size
                this.size = 2.4 + Math.random() * 2.6;

                // Random orange-yellow hue
                this.color = `hsl(${22 + Math.random() * 48}, 100%, 78%)`;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Drag + gravity
                this.vx *= 0.955;
                this.vy *= 0.955;
                this.vy += 0.13;

                // Decay
                this.life -= 1;
            }

            draw(ctx) {
                const alpha = this.life / this.maxLife;

                // Outer glow layer
                ctx.globalAlpha = alpha * 0.38;
                ctx.fillStyle = "#ffdd99";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2.9, 0, Math.PI * 2);
                ctx.fill();

                // Bright core
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ====================== SPARK MANAGER CLASS ======================
        class SparkManager {
            constructor() {
                this.sparks = [];
            }

            emit(x, y, count) {
                if (count < 1) return;
                const intCount = Math.floor(count);
                for (let i = 0; i < intCount; i++) {
                    this.sparks.push(new Spark(x, y));
                }
            }

            update() {
                // Backward loop so we can safely splice
                for (let i = this.sparks.length - 1; i >= 0; i--) {
                    this.sparks[i].update();
                    if (this.sparks[i].life <= 0) {
                        this.sparks.splice(i, 1);
                    }
                }
            }

            draw(ctx) {
                for (let i = 0; i < this.sparks.length; i++) {
                    this.sparks[i].draw(ctx);
                }
            }
        }

        // ====================== MAIN SETUP ======================
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const rateSlider = document.getElementById("rate");
        const rateValue = document.getElementById("rateValue");

        let emissionRate = 7;           // ← Change initial value here if you want
        rateValue.textContent = emissionRate;

        // Update emission rate live when slider moves
        rateSlider.addEventListener("input", () => {
            emissionRate = Number(rateSlider.value);
            rateValue.textContent = emissionRate;
        });

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
        });

        const manager = new SparkManager();

        // Sparkler tip (glowing burning end)
        function drawTip(ctx, x, y) {
            // Outer glow
            ctx.globalAlpha = 0.55;
            ctx.fillStyle = "#ffaa33";
            ctx.beginPath();
            ctx.arc(x, y, 13.5, 0, Math.PI * 2);
            ctx.fill();

            // Mid glow
            ctx.globalAlpha = 0.9;
            ctx.fillStyle = "#ffee66";
            ctx.beginPath();
            ctx.arc(x, y, 7.5, 0, Math.PI * 2);
            ctx.fill();

            // White hot center
            ctx.globalAlpha = 1;
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(x, y, 3.2, 0, Math.PI * 2);
            ctx.fill();
        }

        // ====================== ANIMATION LOOP ======================
        function animate() {
            // Gentle fade for beautiful trails
            ctx.fillStyle = "rgba(4, 4, 18, 0.23)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 1. Update existing sparks
            manager.update();

            // 2. Emit new sparks from mouse (tip)
            manager.emit(mouseX, mouseY, emissionRate);

            // 3. Draw all sparks
            manager.draw(ctx);

            // 4. Draw the sparkler tip on top
            drawTip(ctx, mouseX, mouseY);

            requestAnimationFrame(animate);
        }

        // Start it!
        animate();
    </script>
</body>
</html>
