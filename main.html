<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 20px;
        }
        .buttons {
            margin-bottom: 10px;
        }
        button {
            margin: 10px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        iframe {
            width: 100%;
            height: 800px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>Welcome to the Game Hub</h1>
    <div class="buttons">
        <button onclick="loadGame('beertimer.html')">Beer Timer</button>
        <button onclick="loadGame('roguelikegame.html')">Roguelike Game</button>
        <button onclick="loadGame('solarsystem.html')">Solar System</button>
        <button onclick="loadGame('strategygame.html')">Strategy Game</button>
    </div>
    <iframe id="gameFrame" src=""></iframe>

    <script>
        function loadGame(url) {
            document.getElementById('gameFrame').src = url;
        }
    </script>
</body>
</html>
